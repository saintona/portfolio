<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid Menu</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#fff;
  overflow:hidden;
  font-family: Arial, sans-serif;
}

/* GRID */
#grid{
  position:fixed;
  inset:0;
  display:grid;
  pointer-events:none;
}

.tile{
  display:flex;
  align-items:center;
  justify-content:center;
}

.dot{
  width:4px;
  height:4px;
  border-radius:50%;
  background:#000;
  opacity:0;
  transition:opacity 0.8s ease;
}

/* ENTER */
#enterScreen{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10;
  transition:opacity 0.6s ease, transform 0.6s ease;
}

.button{
  width:240px;
  height:120px;

  display:flex;
  align-items:center;
  justify-content:center;

  border-radius:18px;
  background:rgba(255,255,255,0.35);
  border:1px solid rgba(0,0,0,0.15);
  backdrop-filter: blur(10px);

  font-size:18px;
  letter-spacing:0.2em;
  text-transform:lowercase;

  cursor:pointer;
}

/* MENU */
#menu{
  position:fixed;
  inset:0;
  display:flex;

  overflow-x:auto;
  scroll-snap-type:x mandatory;
  scrollbar-width:none;

  opacity:0;
  transform:scale(0.95);
  transition:opacity 0.6s ease, transform 0.6s ease;

  pointer-events:none;
}

#menu::-webkit-scrollbar{display:none;}

#menu.active{
  opacity:1;
  transform:scale(1);
  pointer-events:auto;
}

.item{
  min-width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  scroll-snap-align:center;
}

/* SUBTEXT */
#subtext{
  position:fixed;
  left:50%;
  bottom:28%;
  transform:translateX(-50%);

  font-size:12px;
  font-weight:700;
  letter-spacing:0.05em;

  opacity:0;
  color:#000;

  pointer-events:none;
  transition:opacity 0.4s ease;
}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;

  opacity:0;
  pointer-events:none;
  transition:opacity 0.4s ease;
}

#modal.active{
  opacity:1;
  pointer-events:auto;
}

.modal-box{
  width:min(1100px, 92vw);
  height:85%;

  border-radius:28px;

  background:rgba(0,0,0,0.35);
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  border:1px solid rgba(255,255,255,0.12);

  overflow-y:auto;
  padding:24px;

  transform:scale(0.92);
  transition:transform 0.4s ease;

  display:flex;
  flex-direction:column;
  align-items:center;
}

#modal.active .modal-box{
  transform:scale(1);
}

.modal-box::-webkit-scrollbar{
  display:none;
}

/* ⭐ MASONRY GALLERY */
#gallery{
  width:100%;
  column-count:3;
  column-gap:16px;
}

@media (max-width: 1000px){
  #gallery{
    column-count:2;
  }
}

@media (max-width: 600px){
  #gallery{
    column-count:1;
  }
}

/* IMAGES */
.art-img{
  width:100%;
  display:block;

  margin-bottom:16px;

  border-radius:18px;
  cursor:pointer;

  transition: transform 0.25s ease, filter 0.25s ease;
}

.art-img:hover{
  transform: scale(1.02);
  filter: brightness(1.05);
}

/* AUDIO */
.audio-item{
  width:100%;
  margin-bottom:16px;
  break-inside: avoid;
}

audio{
  width:100%;
  border-radius:12px;
}

/* VIEWER */
#viewer{
  position:fixed;
  inset:0;

  display:flex;
  align-items:center;
  justify-content:center;

  background:rgba(0,0,0,0.6);
  backdrop-filter: blur(18px);

  opacity:0;
  pointer-events:none;
  transition:opacity 0.3s ease;
}

#viewer.active{
  opacity:1;
  pointer-events:auto;
}

#viewer img{
  max-width:90%;
  max-height:90%;
  object-fit:contain;
  border-radius:18px;
}
</style>
</head>

<body>

<div id="grid"></div>

<!-- ENTER -->
<div id="enterScreen">
  <div class="button" id="enterBtn">enter</div>
</div>

<!-- MENU -->
<div id="menu">
  <div class="item"><div class="button" id="artBtn">art</div></div>
  <div class="item"><div class="button" id="fashionBtn">fashion</div></div>
  <div class="item"><div class="button" id="musicBtn">music</div></div>
</div>

<!-- SUBTEXT -->
<div id="subtext">swipe for next / previous medium</div>

<!-- MODAL -->
<div id="modal">
  <div class="modal-box" id="gallery"></div>
</div>

<!-- VIEWER -->
<div id="viewer">
  <img id="viewerImg">
</div>

<script>

/* GRID */
const grid = document.getElementById("grid");
const SIZE = 20;
const DENSITY = 0.08;
let dots = [];

function buildGrid(){
  grid.innerHTML="";
  dots=[];

  const cols = Math.ceil(window.innerWidth / SIZE);
  const rows = Math.ceil(window.innerHeight / SIZE);

  grid.style.gridTemplateColumns = `repeat(${cols}, ${SIZE}px)`;
  grid.style.gridTemplateRows = `repeat(${rows}, ${SIZE}px)`;

  for(let i=0;i<cols*rows;i++){
    const tile=document.createElement("div");
    tile.className="tile";

    const dot=document.createElement("div");
    dot.className="dot";

    tile.appendChild(dot);
    grid.appendChild(tile);

    dots.push(dot);
  }
}

function updateGrid(){
  dots.forEach(d=>{
    d.style.opacity = Math.random() < DENSITY ? 0.5 : 0;
  });
}

setInterval(updateGrid,2000);

/* ENTER */
const enterBtn = document.getElementById("enterBtn");
const enterScreen = document.getElementById("enterScreen");
const menu = document.getElementById("menu");
const subtext = document.getElementById("subtext");

enterBtn.onclick = () => {
  enterScreen.style.opacity = "0";
  enterScreen.style.transform = "scale(1.05)";

  setTimeout(() => {
    enterScreen.style.display = "none";
    menu.classList.add("active");
    subtext.style.opacity = "0.5";
  }, 600);
};

/* DATA */
const artImages = [
  "bald.png","2art.jpg","3art.jpg","4art.jpg","5art.jpg",
  "6art.jpg","7art.jpg","8art.jpg","9art.jpg","10art.jpg"
];

const fashionImages = [
  "1fashion.jpg","2fashion.jpg","3fashion.jpg","4fashion.jpg","5fashion.jpg",
  "6fashion.jpg","7fashion.jpg","8fashion.jpg","9fashion.jpg","10fashion.jpg"
];

const musicTracks = [
  "1music.mp3","2music.mp3","3music.mp3","4music.mp3","5music.mp3",
  "6music.mp3","7music.mp3","8music.mp3","9music.mp3","10music.mp3"
];

/* ELEMENTS */
const artBtn = document.getElementById("artBtn");
const fashionBtn = document.getElementById("fashionBtn");
const musicBtn = document.getElementById("musicBtn");

const modal = document.getElementById("modal");
const gallery = document.getElementById("gallery");

const viewer = document.getElementById("viewer");
const viewerImg = document.getElementById("viewerImg");

/* IMAGE GALLERY */
function openGallery(images){

  gallery.innerHTML="";

  images.forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    img.className="art-img";

    img.onclick=()=>{
      viewerImg.src=src;
      viewer.classList.add("active");
    };

    gallery.appendChild(img);
  });

  modal.classList.add("active");
}

/* MUSIC */
function openMusic(tracks){

  gallery.innerHTML="";

  tracks.forEach(src=>{
    const wrap=document.createElement("div");
    wrap.className="audio-item";

    const audio=document.createElement("audio");
    audio.controls=true;
    audio.src=src;

    wrap.appendChild(audio);
    gallery.appendChild(wrap);
  });

  modal.classList.add("active");
}

/* BUTTONS */
artBtn.onclick = () => openGallery(artImages);
fashionBtn.onclick = () => openGallery(fashionImages);
musicBtn.onclick = () => openMusic(musicTracks);

/* CLOSE MODAL */
modal.onclick = (e)=>{
  if(e.target === modal){
    modal.classList.remove("active");
  }
};

/* CLOSE VIEWER */
viewer.onclick = ()=>{
  viewer.classList.remove("active");
};

buildGrid();
updateGrid();
window.addEventListener("resize", buildGrid);

</script>

</body>
</html>
